# questionnaire/questions.yaml — preguntas interactivas del cuestionario
#
# Cada pregunta mapea a un path del schema.yaml. Condicionales opcionales en
# `when:` usan el DSL de tools/lib/condition-parser.ts (== != in && || !).

version: "0.1.0"

questions:
  # ─── Sección A — Identidad ──────────────────
  - id: a_intro
    section: A
    type: info
    text: "Empezamos por la identidad del proyecto."

  - id: a_name
    section: A
    type: text
    text: "Slug del proyecto (minúsculas, guiones)"
    description: "Usado como nombre de directorio, repo y paquete."
    maps_to: identity.name
    validation:
      pattern: "^[a-z][a-z0-9-]{2,}$"
      minLength: 3
      maxLength: 64

  - id: a_description
    section: A
    type: text
    text: "Descripción en una línea"
    maps_to: identity.description
    validation:
      minLength: 10
      maxLength: 240

  - id: a_license
    section: A
    type: single
    text: "Licencia"
    maps_to: identity.license
    options:
      - { value: "MIT", label: "MIT (recomendado)" }
      - { value: "Apache-2.0", label: "Apache 2.0" }
      - { value: "BSD-3-Clause", label: "BSD 3-Clause" }
      - { value: "ISC", label: "ISC" }
      - { value: "PROPRIETARY", label: "Propietario (repo privado)" }

  - id: a_owner
    section: A
    type: text
    text: "Owner (usuario u organización GitHub)"
    maps_to: identity.owner

  # ─── Sección B — Dominio ────────────────────
  - id: b_domain
    section: B
    type: single
    text: "Tipo de proyecto"
    maps_to: domain.type
    options:
      - { value: "web-app", label: "Web app (frontend + backend)" }
      - { value: "api", label: "API / servicio backend" }
      - { value: "cli", label: "CLI / herramienta de línea de comandos" }
      - { value: "agent-sdk", label: "Agent SDK / integración con Claude" }
      - { value: "library", label: "Librería reutilizable" }

  # ─── Sección C — Stack ──────────────────────
  - id: c_language
    section: C
    type: single
    text: "Lenguaje principal"
    maps_to: stack.language
    options:
      - { value: "typescript", label: "TypeScript" }
      - { value: "javascript", label: "JavaScript" }
      - { value: "python", label: "Python" }
      - { value: "go", label: "Go" }
      - { value: "rust", label: "Rust" }

  - id: c_database
    section: C
    type: single
    text: "Base de datos"
    maps_to: stack.database
    options:
      - { value: "none", label: "Ninguna" }
      - { value: "postgres", label: "PostgreSQL" }
      - { value: "sqlite", label: "SQLite" }
      - { value: "mongodb", label: "MongoDB" }
      - { value: "redis", label: "Redis" }

  # ─── Sección D — Testing ────────────────────
  - id: d_unit_ts
    section: D
    type: single
    text: "Framework de tests unit (Node)"
    when: "stack.language in ['typescript', 'javascript']"
    maps_to: testing.unit_framework
    options:
      - { value: "vitest", label: "Vitest (recomendado)" }
      - { value: "jest", label: "Jest" }

  - id: d_unit_py
    section: D
    type: single
    text: "Framework de tests unit (Python)"
    when: "stack.language == 'python'"
    maps_to: testing.unit_framework
    options:
      - { value: "pytest", label: "pytest (recomendado)" }

  - id: d_unit_go
    section: D
    type: single
    text: "Framework de tests unit (Go)"
    when: "stack.language == 'go'"
    maps_to: testing.unit_framework
    options:
      - { value: "go-test", label: "go test (stdlib)" }

  - id: d_unit_rust
    section: D
    type: single
    text: "Framework de tests unit (Rust)"
    when: "stack.language == 'rust'"
    maps_to: testing.unit_framework
    options:
      - { value: "cargo-test", label: "cargo test" }

  - id: d_coverage
    section: D
    type: number
    text: "Cobertura mínima de líneas (%)"
    description: "Por debajo de este umbral, CI bloquea el merge."
    maps_to: testing.coverage_threshold
    min: 0
    max: 100

  - id: d_e2e
    section: D
    type: single
    text: "Framework e2e (solo web)"
    when: "domain.type == 'web-app'"
    maps_to: testing.e2e_framework
    options:
      - { value: "none", label: "Ninguno" }
      - { value: "playwright", label: "Playwright (recomendado)" }
      - { value: "cypress", label: "Cypress" }

  # ─── Sección E — Integraciones ──────────────
  - id: e_mcps
    section: E
    type: multi
    text: "MCPs opt-in (selección múltiple)"
    description: "Solo allowlist. Ver docs/KNOWN_GOOD_MCPS.md."
    maps_to: integrations.mcps
    options:
      - { value: "mempalace", label: "MemPalace (memoria persistente)" }
      - { value: "notebooklm", label: "PleasePrompto/notebooklm-mcp (research grounded)" }

  - id: e_observability
    section: E
    type: single
    text: "Observabilidad"
    maps_to: integrations.observability
    options:
      - { value: "none", label: "Ninguna" }
      - { value: "sentry", label: "Sentry" }
      - { value: "datadog", label: "Datadog" }
      - { value: "opentelemetry", label: "OpenTelemetry" }

  # ─── Sección F — Workflow ───────────────────
  - id: f_ci_host
    section: F
    type: single
    text: "Host de CI"
    maps_to: workflow.ci_host
    options:
      - { value: "github", label: "GitHub Actions (recomendado)" }
      - { value: "gitlab", label: "GitLab CI" }
      - { value: "bitbucket", label: "Bitbucket Pipelines" }

  - id: f_release
    section: F
    type: single
    text: "Estrategia de release"
    maps_to: workflow.release_strategy
    options:
      - { value: "manual", label: "Manual (tags a mano)" }
      - { value: "semantic-release", label: "semantic-release" }
      - { value: "changesets", label: "changesets" }
      - { value: "conventional", label: "conventional-changelog" }

  - id: f_branch_protection
    section: F
    type: bool
    text: "¿Aplicar branch protection declarativa a main?"
    maps_to: workflow.branch_protection

  - id: f_token_budget
    section: F
    type: number
    text: "Soft limit de tokens por sesión Claude Code"
    description: "Warning cuando la sesión se acerca. Default 150000."
    maps_to: workflow.token_budget_session_soft
    min: 50000
    max: 500000

  # ─── Sección G — Claude Code ────────────────
  - id: g_model
    section: G
    type: single
    text: "Modelo default de Claude"
    maps_to: claude_code.default_model
    options:
      - { value: "claude-sonnet-4-6", label: "Sonnet 4.6 (recomendado)" }
      - { value: "claude-opus-4-7", label: "Opus 4.7 (arquitectura / costoso)" }
      - { value: "claude-haiku-4-5", label: "Haiku 4.5 (lookups / barato)" }

  - id: g_team
    section: G
    type: single
    text: "Tamaño del equipo"
    maps_to: claude_code.team_size
    options:
      - { value: "solo", label: "Solo (un contributor)" }
      - { value: "team", label: "Team (varios contributors)" }

  - id: g_memory
    section: G
    type: bool
    text: "¿Activar memoria persistente (MemPalace)?"
    description: "Requiere MCP en opt-in. Ver docs/SAFETY_POLICY.md."
    maps_to: claude_code.persistent_memory
