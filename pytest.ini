[pytest]
# Use importlib-based import mode so pytest can discover tests across sibling
# dirs whose basename collides (e.g. `hooks/tests/` and `.claude/skills/tests/`)
# without requiring a shared package prefix. Without this, the second
# directory fails collection with "No module named 'tests.*'".
# See https://docs.pytest.org/en/stable/explanation/pythonpath.html
addopts = --import-mode=importlib
